# pi-gen's export-image/03-network installs a static /etc/resolv.conf holding
# nameserver 8.8.8.8, and it runs after this stage, clobbering the symlink that
# systemd-resolved's postinst creates. A real file there means resolved is never
# consulted and DHCP-provided DNS is ignored, so .lan names do not resolve.
# Restore the symlink on every boot. L+ replaces whatever is already there.
L+ /etc/resolv.conf - - - - ../run/systemd/resolve/stub-resolv.conf
